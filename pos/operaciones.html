<div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

<script>
const API = '/Logos/api';
const $   = id => document.getElementById(id);

let toastTimer = null;
function toast(msg, tipo = '') {
  const el = $('toast');
  el.textContent = msg;
  el.className = 'toast' + (tipo ? ' ' + tipo : '');
  void el.offsetWidth;
  el.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('visible'), tipo === 'err' ? 5500 : 3500);
}
function fmt(n) {
  return '$' + Number(n || 0).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[c]);
}

const COLUMNAS_PAGO = [
  { tipo: 'efectivo',      },
  { tipo: 'transferencia', },
  { tipo: 'tarjeta',       },
  { tipo: 'cheque',        },
  { tipo: 'cc',            },
];

function montoColumna(v, tipo) {
  if (v.tipo_pago === 'mixto') {
    const p = (v.pagos || []).find(p => p.tipo === tipo);
    return p ? Number(p.monto) : 0;
  }
  return v.tipo_pago === tipo ? Number(v.total) : 0;
}

const esAdmin = window.LOGOS_SESION?.rol === 'admin';
let ventasCache = [];

async function init() {
  if (esAdmin) {
    const res = await fetch(`${API}/cajas`);
    const cajas = await res.json();
    const sel = $('fil-caja');
    sel.style.display = '';
    sel.innerHTML = '<option value="">Todas las cajas</option>' +
      cajas.map(c => `<option value="${c.id}">${esc(c.nombre)}</option>`).join('');
    sel.addEventListener('change', cargar);
  }
  const hoy = new Date().toISOString().split('T')[0];
  $('fil-desde').value = hoy;
  $('fil-hasta').value = hoy;
  $('fil-desde').addEventListener('change', cargar);
  $('fil-hasta').addEventListener('change', cargar);
  cargar();
}

async function cargar() {
  const params = new URLSearchParams();
  params.set('limit', '500');
  const cajaId = esAdmin ? $('fil-caja').value : window.LOGOS_SESION?.caja_id;
  if (cajaId) params.set('caja_id', cajaId);
  if ($('fil-desde').value) params.set('fecha_desde', $('fil-desde').value);
  if ($('fil-hasta').value) params.set('fecha_hasta', $('fil-hasta').value);

  const res = await fetch(`${API}/ventas?${params.toString()}`);
  const data = await res.json();
  if (!res.ok) { toast(data.error || 'Error al cargar las operaciones', 'err'); return; }

  ventasCache = data;
  render(data);
}

function render(data) {
  if (!data.length) {
    $('tbody').innerHTML = '<tr><td colspan="10"><div class="vacio">No hay operaciones para los filtros aplicados.</div></td></tr>';
    $('tfoot').style.display = 'none';
    return;
  }

  $('tbody').innerHTML = data.map(v => {
    const cols = COLUMNAS_PAGO.map(c => {
      const m = montoColumna(v, c.tipo);
      return m > 0 ? `<td class="r">${fmt(m)}</td>` : `<td class="r vacia">—</td>`;
    }).join('');
    return `
    <tr data-id="${v.id}">
      <td>${new Date(v.fecha).toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric' })}</td>
      <td><span class="tipo-badge">${esc(v.tipo_comprobante ?? '—')}</span>N° ${esc(v.numero)}</td>
      <td>${esc(v.cliente_nombre ?? '— Consumidor final —')}</td>
      ${cols}
      <td class="r">${fmt(v.total)}</td>
      <td>
        <button class="acc-btn ver" data-id="${v.id}">Ver</button>
        <button class="acc-btn editar" data-id="${v.id}">Editar</button>
      </td>
    </tr>`;
  }).join('');

  const totales = COLUMNAS_PAGO.map(c => data.reduce((s, v) => s + montoColumna(v, c.tipo), 0));
  const totalGral = data.reduce((s, v) => s + Number(v.total), 0);
  $('tfoot').innerHTML = `
    <tr>
      <td colspan="3">Totales (${data.length})</td>
      ${totales.map(t => `<td class="r">${fmt(t)}</td>`).join('')}
      <td class="r">${fmt(totalGral)}</td>
      <td></td>
    </tr>`;
  $('tfoot').style.display = '';

  $('tbody').querySelectorAll('.acc-btn.ver').forEach(btn =>
    btn.addEventListener('click', () => accionVer(+btn.dataset.id)));
  $('tbody').querySelectorAll('.acc-btn.editar').forEach(btn =>
    btn.addEventListener('click', () => accionEditar(+btn.dataset.id)));
}

function accionVer(id) {
  window.open(`${API}/ventas/${id}/comprobante`, '_blank');
}

async function accionEditar(id) {
  try {
    const r = await fetch(`${API}/ventas/${id}`);
    const v = await r.json();
    if (!r.ok) { toast(v.error || 'Error al cargar la venta', 'err'); return; }
    try {
      localStorage.setItem('logos_editar_venta', JSON.stringify(v));
    } catch {
      toast('Sin espacio en el navegador para cargar la venta en el editor.', 'err');
      return;
    }
    sessionStorage.setItem('logos_volver_tras_editar', location.href);
    location.href = 'index.html';
  } catch {
    toast('Error de conexión', 'err');
  }
}

function actualizarFecha() {
  const f = $('fecha-hora');
  if (f) f.textContent = new Date().toLocaleString('es-AR', { dateStyle:'short', timeStyle:'short' });
}
actualizarFecha();
setInterval(actualizarFecha, 30000);

init();
</script>
