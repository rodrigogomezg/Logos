<script>
const API = '/Logos/api';
const $   = id => document.getElementById(id);

let toastTimer = null;
function toast(msg, tipo = '') {
  const el = $('toast');
  el.textContent = msg;
  el.className = 'toast' + (tipo ? ' ' + tipo : '');
  void el.offsetWidth;
  el.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('visible'), tipo === 'err' ? 5500 : 3500);
}
function fmt(n) {
  return '$' + Number(n || 0).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[c]);
}

const esAdmin = window.LOGOS_SESION?.rol === 'admin';
let cajasCache = [];
let tipoMovActivo = 'ingreso';
let movimientosCache = [];
let movElimActual = null;

async function init() {
  if (esAdmin) {
    const res = await fetch(`${API}/cajas`);
    cajasCache = await res.json();
    const sel = $('fil-caja');
    sel.style.display = '';
    sel.innerHTML = '<option value="">Todas las cajas</option>' +
      cajasCache.map(c => `<option value="${c.id}">${esc(c.nombre)}</option>`).join('');
    sel.addEventListener('change', cargar);
    document.getElementById('nav-caja-op')?.addEventListener('change', cargarEstadoRegistro);
  }
  $('btn-nuevo-mov').addEventListener('click', abrirModalMov);
  $('mov-close').addEventListener('click', cerrarModalMov);
  $('overlay-mov').addEventListener('click', e => { if (e.target.id === 'overlay-mov') cerrarModalMov(); });
  $('reg-btn-ingreso').addEventListener('click', () => seleccionarTipoMov('ingreso'));
  $('reg-btn-retiro').addEventListener('click', () => seleccionarTipoMov('retiro'));
  $('reg-btn-transferencia').addEventListener('click', () => seleccionarTipoMov('transferencia'));
  $('reg-btn-guardar').addEventListener('click', registrarMovimiento);
  $('fil-desde').addEventListener('change', cargar);
  $('fil-hasta').addEventListener('change', cargar);
  $('elim-mov-close').addEventListener('click', cerrarModalEliminarMov);
  $('elim-mov-cancelar').addEventListener('click', cerrarModalEliminarMov);
  $('elim-mov-confirmar').addEventListener('click', confirmarEliminarMov);
  $('overlay-elim-mov').addEventListener('click', e => { if (e.target.id === 'overlay-elim-mov') cerrarModalEliminarMov(); });
  cargar();
}

function seleccionarTipoMov(tipo) {
  tipoMovActivo = tipo;
  $('reg-btn-ingreso').classList.toggle('activo', tipo === 'ingreso');
  $('reg-btn-retiro').classList.toggle('activo', tipo === 'retiro');
  $('reg-btn-transferencia').classList.toggle('activo', tipo === 'transferencia');
  $('reg-medio-simple-grp').style.display = tipo === 'transferencia' ? 'none' : '';
  $('reg-medio-transf-grp').style.display = tipo === 'transferencia' ? '' : 'none';
}

function abrirModalMov() {
  $('reg-monto').value  = '';
  $('reg-motivo').value = '';
  $('reg-medio').value  = 'efectivo';
  $('reg-medio-origen').value  = 'efectivo';
  $('reg-medio-destino').value = 'transferencia';
  seleccionarTipoMov('ingreso');
  cargarEstadoRegistro();
  $('overlay-mov').classList.add('abierto');
}

function cerrarModalMov() {
  $('overlay-mov').classList.remove('abierto');
}

async function cargarEstadoRegistro() {
  const cajaId = window.cajaOperativaId?.();
  if (!cajaId) return;
  const caja = cajasCache.find(c => c.id === cajaId);
  $('reg-caja-nombre').textContent = '— ' + (caja ? caja.nombre : (window.LOGOS_SESION?.caja_nombre || '—'));

  const res  = await fetch(`${API}/caja-turnos/actual?caja_id=${cajaId}`);
  const data = await res.json();
  const hayTurno = !data.no_aplica && !!data.turno;

  $('reg-form').style.display = hayTurno ? '' : 'none';
  $('reg-sin-turno').classList.toggle('visible', !hayTurno);
}

async function registrarMovimiento() {
  const cajaId = window.cajaOperativaId?.();
  const monto  = parseFloat($('reg-monto').value);
  if (!cajaId || !monto || monto <= 0) { toast('Ingresá un monto válido', 'err'); return; }

  const body = {
    caja_id: cajaId,
    tipo:    tipoMovActivo,
    monto,
    motivo:  $('reg-motivo').value.trim() || null,
  };

  if (tipoMovActivo === 'transferencia') {
    const origen  = $('reg-medio-origen').value;
    const destino = $('reg-medio-destino').value;
    if (origen === destino) { toast('Elegí dos medios de pago distintos', 'err'); return; }
    body.medio_pago         = origen;
    body.medio_pago_destino = destino;
  } else {
    body.medio_pago = $('reg-medio').value;
  }

  const res = await fetch(`${API}/caja-movimientos`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!res.ok) { toast(data.error || 'Error al registrar el movimiento', 'err'); return; }

  toast('Movimiento registrado', 'ok');
  cerrarModalMov();
  cargar();
}

async function cargar() {
  const params = new URLSearchParams();
  const cajaId = esAdmin ? $('fil-caja').value : window.LOGOS_SESION?.caja_id;
  if (cajaId) params.set('caja_id', cajaId);
  if ($('fil-desde').value) params.set('desde', $('fil-desde').value);
  if ($('fil-hasta').value) params.set('hasta', $('fil-hasta').value);

  const res = await fetch(`${API}/caja-movimientos?${params.toString()}`);
  const data = await res.json();
  if (!res.ok) { toast(data.error || 'Error al cargar movimientos', 'err'); return; }

  movimientosCache = data;

  if (!data.length) {
    $('tbody').innerHTML = '<tr><td colspan="8"><div class="vacio">No hay movimientos para los filtros aplicados.</div></td></tr>';
    return;
  }

  const MEDIOS = { efectivo: 'Efectivo', transferencia: 'Transferencia', tarjeta: 'Tarjeta' };
  const TIPOS  = { ingreso: 'Ingreso', retiro: 'Retiro', transferencia: 'Transferencia' };
  const SIGNOS = { ingreso: '+', retiro: '−', transferencia: '⇄' };
  const svgDel = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;

  $('tbody').innerHTML = data.map(m => `
    <tr>
      <td>${new Date(m.creado_en).toLocaleString('es-AR', { dateStyle:'short', timeStyle:'short' })}</td>
      <td>${esc(m.caja_nombre)}</td>
      <td><span class="tag ${m.tipo}">${TIPOS[m.tipo]}</span></td>
      <td>${m.tipo === 'transferencia' ? `${MEDIOS[m.medio_pago]} → ${MEDIOS[m.medio_pago_destino]}` : (MEDIOS[m.medio_pago] || '—')}</td>
      <td>${esc(m.motivo || '—')}</td>
      <td>${esc(m.usuario_nombre)}</td>
      <td class="r">${SIGNOS[m.tipo]}${fmt(m.monto)}</td>
      <td class="col-acciones"><button class="btn-del-mov" data-id="${m.id}" title="Eliminar">${svgDel}</button></td>
    </tr>`).join('');

  $('tbody').querySelectorAll('.btn-del-mov').forEach(btn => {
    btn.addEventListener('click', () => abrirModalEliminarMov(parseInt(btn.dataset.id)));
  });
}

function abrirModalEliminarMov(id) {
  const m = movimientosCache.find(x => x.id === id);
  if (!m) return;
  movElimActual = m;

  const MEDIOS = { efectivo: 'Efectivo', transferencia: 'Transferencia', tarjeta: 'Tarjeta' };
  const TIPOS  = { ingreso: 'Ingreso', retiro: 'Retiro', transferencia: 'Transferencia' };
  $('elim-mov-body').innerHTML = `
    <p>¿Eliminar este movimiento?</p>
    <p style="margin-top:10px;color:var(--gris3);font-size:13px;line-height:1.6">
      <strong>${esc(TIPOS[m.tipo])}</strong> de ${fmt(m.monto)} — ${esc(m.caja_nombre)}<br>
      ${m.tipo === 'transferencia' ? `${esc(MEDIOS[m.medio_pago])} → ${esc(MEDIOS[m.medio_pago_destino])}` : esc(MEDIOS[m.medio_pago] || '')}
      ${m.motivo ? ' · ' + esc(m.motivo) : ''}<br>
      ${new Date(m.creado_en).toLocaleString('es-AR', { dateStyle:'short', timeStyle:'short' })}
    </p>`;
  $('elim-mov-confirmar').disabled    = false;
  $('elim-mov-confirmar').textContent = 'Eliminar';
  $('overlay-elim-mov').classList.add('abierto');
}

function cerrarModalEliminarMov() {
  $('overlay-elim-mov').classList.remove('abierto');
  movElimActual = null;
}

async function confirmarEliminarMov() {
  if (!movElimActual) return;
  const btn = $('elim-mov-confirmar');
  btn.disabled    = true;
  btn.textContent = 'Eliminando…';

  try {
    const res  = await fetch(`${API}/caja-movimientos/${movElimActual.id}?caja_id=${movElimActual.caja_id}`, { method: 'DELETE' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error al eliminar el movimiento');

    cerrarModalEliminarMov();
    toast('Movimiento eliminado', 'ok');
    cargar();
  } catch (e) {
    toast(e.message, 'err');
    btn.disabled    = false;
    btn.textContent = 'Eliminar';
  }
}

function actualizarFecha() {
  const f = $('fecha-hora');
  if (f) f.textContent = new Date().toLocaleString('es-AR', { dateStyle:'short', timeStyle:'short' });
}
actualizarFecha();
setInterval(actualizarFecha, 30000);

init();
