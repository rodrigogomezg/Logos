      <thead>
        <tr>
          <th>N°</th><th>Fecha</th><th>Proveedor</th><th>Comprobante</th><th>Pago</th><th style="text-align:right">Total</th>
        </tr>
      </thead>
      <tbody id="tbody-compras"></tbody>
    </table>
    <div class="vacio" id="vacio" style="display:none">No hay compras en este período</div>
  </div>
</div>

<script>
const API = '/BRON/api';
const $   = id => document.getElementById(id);
const fmt = n => '$ ' + Number(n).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const TIPO_COMPROBANTE_LBL = { factura_a: 'Factura A', factura_b: 'Factura B', remito: 'Remito' };
const TIPO_PAGO_LBL = { efectivo: 'Efectivo', transferencia: 'Transferencia', tarjeta: 'Tarjeta', cc: 'Cta. Corriente', mixto: 'Mixto' };

async function cargarCompras() {
  const params = new URLSearchParams();
  if ($('f-desde').value) params.set('fecha_desde', $('f-desde').value);
  if ($('f-hasta').value) params.set('fecha_hasta', $('f-hasta').value);
  params.set('limit', '200');

  const res = await fetch(`${API}/compras?${params.toString()}`);
  let compras = await res.json();

  const filtroProv = $('f-proveedor').value.trim().toLowerCase();
  if (filtroProv) {
    compras = compras.filter(c => (c.proveedor_nombre || '').toLowerCase().includes(filtroProv));
  }

  if (!compras.length) {
    $('tbody-compras').innerHTML = '';
    $('vacio').style.display = '';
    return;
  }
  $('vacio').style.display = 'none';

  $('tbody-compras').innerHTML = compras.map(c => `
    <tr>
      <td class="num">#${esc(c.numero)}</td>
      <td>${esc(c.fecha)}</td>
      <td>${esc(c.proveedor_nombre || '—')}</td>
      <td><span class="tipo-pill">${esc(TIPO_COMPROBANTE_LBL[c.tipo_comprobante] || c.tipo_comprobante || '—')}</span></td>
      <td>${esc(TIPO_PAGO_LBL[c.tipo_pago] || c.tipo_pago || '—')}</td>
      <td class="total">${fmt(c.total)}</td>
    </tr>
  `).join('');
}

$('btn-filtrar').addEventListener('click', cargarCompras);

(function initFechas() {
  const hoy = new Date();
  const hace30 = new Date(); hace30.setDate(hace30.getDate() - 30);
  $('f-hasta').value = hoy.toISOString().split('T')[0];
  $('f-desde').value = hace30.toISOString().split('T')[0];
})();

cargarCompras();
</script>
