<?php $nav_activo = 'caja'; include __DIR__ . '/nav.php'; ?>

<div class="page-header">
  <h1>Caja</h1>
  <p>Apertura, movimientos y cierre del turno actual</p>
</div>

<div class="contenido">
<div class="contenido-inner" id="contenido-inner">
  <div class="card"><p class="form-hint">Cargando...</p></div>
</div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

<script>
const API = '/BRON/api';
const $   = id => document.getElementById(id);

let toastTimer = null;
function toast(msg, tipo = '') {
  const el = $('toast');
  el.textContent = msg;
  el.className = 'toast' + (tipo ? ' ' + tipo : '');
  void el.offsetWidth;
  el.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('visible'), tipo === 'err' ? 5500 : 3500);
}
function fmt(n) {
  return '$' + Number(n || 0).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

const cajaId = window.BRON_SESION?.caja_id ?? null;
let estadoActual  = null; // datos del turno actual / sugerencia

async function cargar() {
  if (!cajaId) {
    $('contenido-inner').innerHTML = '<div class="card"><p class="form-hint">No hay una caja activa en la sesión.</p></div>';
    return;
  }
  const res = await fetch(`${API}/caja-turnos/actual?caja_id=${cajaId}`);
  const data = await res.json();
  estadoActual = data;

  if (data.no_aplica) {
    renderNoAplica();
  } else if (!data.turno) {
    renderApertura(data.fondo_sugerido || 0);
  } else {
    renderTurnoAbierto(data);
  }
}

function renderNoAplica() {
  $('contenido-inner').innerHTML = `
    <div class="card">
      <div class="no-aplica">Esta caja (<strong>${esc(window.BRON_SESION?.caja_nombre || '')}</strong>) no maneja apertura ni cierre de turno.</div>
    </div>`;
}

function renderApertura(fondoSugerido) {
  $('contenido-inner').innerHTML = `
    <div class="card">
      <div class="card-titulo">
        Abrir caja — ${esc(window.BRON_SESION?.caja_nombre || '')}
        <span class="estado-pill cerrado"><span class="dot"></span>Sin turno abierto</span>
      </div>
      <div class="form-grid">
        <div class="form-group full">
          <label class="form-label">Fondo inicial</label>
          <input class="form-input" id="ap-fondo" type="number" min="0" step="0.01" value="${Number(fondoSugerido).toFixed(2)}">
          <span class="form-hint">Sugerido a partir del efectivo contado en el último cierre de esta caja.</span>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-ok" id="ap-btn">Abrir caja</button>
      </div>
    </div>`;
  $('ap-btn').addEventListener('click', abrirCaja);
}

async function abrirCaja() {
  const fondo_inicial = parseFloat($('ap-fondo').value);
  if (isNaN(fondo_inicial) || fondo_inicial < 0) { toast('Fondo inicial inválido', 'err'); return; }

  $('ap-btn').disabled = true;
  const res = await fetch(`${API}/caja-turnos`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ caja_id: cajaId, fondo_inicial }),
  });
  const data = await res.json();
  if (!res.ok) { toast(data.error || 'Error al abrir la caja', 'err'); $('ap-btn').disabled = false; return; }

  toast('Caja abierta');
  cargar();
}

function renderTurnoAbierto(data) {
  const t = data.turno;
  const esperado = Number(t.fondo_inicial) + data.total_efectivo;

  $('contenido-inner').innerHTML = `
    <div class="card">
      <div class="card-titulo">
        Turno actual — ${esc(window.BRON_SESION?.caja_nombre || '')}
        <span class="estado-pill abierto"><span class="dot"></span>Abierto</span>
      </div>
      <p class="form-hint" style="margin-bottom:16px;">Abierto por ${esc(t.usuario_nombre)} el ${new Date(t.abierto_en).toLocaleString('es-AR', { dateStyle:'short', timeStyle:'short' })} · Fondo inicial ${fmt(t.fondo_inicial)}</p>
      <div class="totales-grid">
        <div class="total-box"><div class="lbl">Efectivo</div><div class="val">${fmt(data.total_efectivo)}</div></div>
        <div class="total-box"><div class="lbl">Tarjeta</div><div class="val">${fmt(data.total_tarjeta)}</div></div>
        <div class="total-box"><div class="lbl">Transferencia</div><div class="val">${fmt(data.total_transferencia)}</div></div>
        <div class="total-box"><div class="lbl">Cheque</div><div class="val">${fmt(data.total_cheque)}</div></div>
        <div class="total-box"><div class="lbl">Cuenta corriente</div><div class="val">${fmt(data.total_cc)}</div></div>
        <div class="total-box destacado"><div class="lbl">Efectivo esperado</div><div class="val">${fmt(esperado)}</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-titulo">Cerrar caja</div>
      <div class="form-grid">
        <div class="form-group full">
          <label class="form-label">Efectivo contado</label>
          <input class="form-input" id="cierre-contado" type="number" min="0" step="0.01">
        </div>
      </div>
      <div class="diferencia-box" id="diferencia-box" style="display:none;">
        <div class="lbl form-label">Diferencia</div>
        <div class="val" id="diferencia-val"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-ok" id="cierre-btn">Cerrar caja</button>
      </div>
    </div>
  `;

  $('cierre-contado').addEventListener('input', () => actualizarDiferencia(esperado));
  $('cierre-btn').addEventListener('click', () => cerrarCaja(t.id));
}

function actualizarDiferencia(esperado) {
  const contado = parseFloat($('cierre-contado').value);
  const box = $('diferencia-box');
  if (isNaN(contado)) { box.style.display = 'none'; return; }
  const dif = contado - esperado;
  box.style.display = 'block';
  box.className = 'diferencia-box ' + (Math.abs(dif) < 0.01 ? 'ok' : (dif < 0 ? 'falta' : 'sobra'));
  $('diferencia-val').textContent = (dif >= 0 ? '+' : '') + fmt(dif) + (Math.abs(dif) < 0.01 ? ' (sin diferencia)' : (dif < 0 ? ' (falta)' : ' (sobra)'));
}

async function cerrarCaja(turnoId) {
  const efectivo_contado = parseFloat($('cierre-contado').value);
  if (isNaN(efectivo_contado) || efectivo_contado < 0) { toast('Efectivo contado inválido', 'err'); return; }

  $('cierre-btn').disabled = true;
  const res = await fetch(`${API}/caja-turnos/${turnoId}/cerrar`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ efectivo_contado }),
  });
  const data = await res.json();
  if (!res.ok) { toast(data.error || 'Error al cerrar la caja', 'err'); $('cierre-btn').disabled = false; return; }

  toast('Caja cerrada');
  cargar();
}

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[c]);
}

function actualizarFecha() {
  const f = $('fecha-hora');
  if (f) f.textContent = new Date().toLocaleString('es-AR', { dateStyle:'short', timeStyle:'short' });
}
actualizarFecha();
setInterval(actualizarFecha, 30000);

cargar();
</script>
