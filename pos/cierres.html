      <button class="btn-sec" id="elim-turno-cancelar" type="button">Cancelar</button>
      <button class="btn-danger" id="elim-turno-confirmar" type="button">Eliminar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

<script>
const API = '/Logos/api';
const $   = id => document.getElementById(id);

let toastTimer = null;
function toast(msg, tipo = '') {
  const el = $('toast');
  el.textContent = msg;
  el.className = 'toast' + (tipo ? ' ' + tipo : '');
  void el.offsetWidth;
  el.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('visible'), tipo === 'err' ? 5500 : 3500);
}
function fmt(n) {
  return n === null || n === undefined ? '—' : '$' + Number(n).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[c]);
}

const esAdmin = window.LOGOS_SESION?.rol === 'admin';
let turnosCache  = [];
let turnoElimActual = null;

async function init() {
  if (esAdmin) {
    const res = await fetch(`${API}/cajas`);
    const cajas = await res.json();
    const sel = $('fil-caja');
    sel.style.display = '';
    sel.innerHTML = '<option value="">Todas las cajas</option>' +
      cajas.map(c => `<option value="${c.id}">${esc(c.nombre)}</option>`).join('');
    sel.addEventListener('change', cargar);
  }
  $('fil-desde').addEventListener('change', cargar);
  $('fil-hasta').addEventListener('change', cargar);
  $('elim-turno-close').addEventListener('click', cerrarModalEliminarTurno);
  $('elim-turno-cancelar').addEventListener('click', cerrarModalEliminarTurno);
  $('elim-turno-confirmar').addEventListener('click', confirmarEliminarTurno);
  $('overlay-elim-turno').addEventListener('click', e => { if (e.target.id === 'overlay-elim-turno') cerrarModalEliminarTurno(); });
  cargar();
}

async function cargar() {
  const params = new URLSearchParams();
  const cajaId = esAdmin ? $('fil-caja').value : window.LOGOS_SESION?.caja_id;
  if (cajaId) params.set('caja_id', cajaId);
  if ($('fil-desde').value) params.set('desde', $('fil-desde').value);
  if ($('fil-hasta').value) params.set('hasta', $('fil-hasta').value);

  const res = await fetch(`${API}/caja-turnos?${params.toString()}`);
  const data = await res.json();
  if (!res.ok) { toast(data.error || 'Error al cargar los cierres', 'err'); return; }

  turnosCache = data;

  if (!data.length) {
    $('tbody').innerHTML = '<tr><td colspan="10"><div class="vacio">No hay turnos para los filtros aplicados.</div></td></tr>';
    return;
  }

  const svgDel = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;

  $('tbody').innerHTML = data.map(t => {
    let difClase = '', difTxt = fmt(t.diferencia);
    if (t.diferencia !== null) {
      const d = Number(t.diferencia);
      difClase = Math.abs(d) < 0.01 ? 'dif-ok' : (d < 0 ? 'dif-falta' : 'dif-sobra');
    }
    const btnDel = (esAdmin && t.estado === 'cerrado')
      ? `<button class="btn-del-mov" data-id="${t.id}" title="Eliminar cierre">${svgDel}</button>` : '';
    return `
    <tr>
      <td>${new Date(t.abierto_en).toLocaleString('es-AR', { dateStyle:'short', timeStyle:'short' })}</td>
      <td>${t.cerrado_en ? new Date(t.cerrado_en).toLocaleString('es-AR', { dateStyle:'short', timeStyle:'short' }) : '—'}</td>
      <td>${esc(t.caja_nombre)}</td>
      <td>${esc(t.usuario_nombre)}</td>
      <td><span class="estado-pill ${t.estado}"><span class="dot"></span>${t.estado === 'abierto' ? 'Abierto' : 'Cerrado'}</span></td>
      <td class="r">${fmt(t.fondo_inicial)}</td>
      <td class="r">${fmt(t.efectivo_esperado)}</td>
      <td class="r">${fmt(t.efectivo_contado)}</td>
      <td class="r ${difClase}">${difTxt}</td>
      <td class="col-acciones">${btnDel}</td>
    </tr>`;
  }).join('');

  $('tbody').querySelectorAll('.btn-del-mov').forEach(btn => {
    btn.addEventListener('click', () => abrirModalEliminarTurno(parseInt(btn.dataset.id)));
  });
}

function abrirModalEliminarTurno(id) {
  const t = turnosCache.find(x => x.id === id);
  if (!t) return;
  turnoElimActual = t;

  $('elim-turno-body').innerHTML = `
    <p>¿Eliminar este cierre?</p>
    <p style="margin-top:10px;color:var(--gris3);font-size:13px;line-height:1.6">
      <strong>${esc(t.caja_nombre)}</strong> · ${esc(t.usuario_nombre)}<br>
      ${new Date(t.abierto_en).toLocaleString('es-AR', { dateStyle:'short', timeStyle:'short' })}
      → ${t.cerrado_en ? new Date(t.cerrado_en).toLocaleString('es-AR', { dateStyle:'short', timeStyle:'short' }) : '—'}
    </p>
    <p style="margin-top:10px;color:var(--gris3);font-size:12px">
      Solo se puede eliminar si el turno no tiene ventas ni movimientos asociados.
    </p>`;
  $('elim-turno-confirmar').disabled    = false;
  $('elim-turno-confirmar').textContent = 'Eliminar';
  $('overlay-elim-turno').classList.add('abierto');
}

function cerrarModalEliminarTurno() {
  $('overlay-elim-turno').classList.remove('abierto');
  turnoElimActual = null;
}

async function confirmarEliminarTurno() {
  if (!turnoElimActual) return;
  const btn = $('elim-turno-confirmar');
  btn.disabled    = true;
  btn.textContent = 'Eliminando…';

  try {
    const res  = await fetch(`${API}/caja-turnos/${turnoElimActual.id}`, { method: 'DELETE' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error al eliminar el cierre');

    cerrarModalEliminarTurno();
    toast('Cierre eliminado', 'ok');
    cargar();
  } catch (e) {
    toast(e.message, 'err');
    btn.disabled    = false;
    btn.textContent = 'Eliminar';
  }
}

function actualizarFecha() {
  const f = $('fecha-hora');
  if (f) f.textContent = new Date().toLocaleString('es-AR', { dateStyle:'short', timeStyle:'short' });
}
actualizarFecha();
setInterval(actualizarFecha, 30000);

init();
</script>
